<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Modifier Tâche')}"></head>
    <body class="bg-primary">
        <div class="mx-auto w-full max-w-2xl flex flex-col gap-4 rounded-xl border border-white/30 bg-white/10 p-6 shadow-2xl backdrop-blur-sm">
            <h1 class="text-2xl font-bold text-white">Modifier la tâche</h1>
            <form th:action="@{/dashboard/{id}/edit(id=${task.id})}" method="post" class="flex flex-col gap-4">
                <input type="hidden" name="_method" value="patch"/>
                <input type="text"
                       name="description"
                       th:value="${task.description}"
                       class="rounded-xl border border-white/30 bg-white/20 px-4 py-2 text-white placeholder-white/60 outline-none"/>
                <div class="flex gap-2">
                    <button type="submit" class="btn-primary">Enregistrer</button>
                    <a th:href="@{/dashboard}" class="btn-primary">Annuler</a>
                </div>
            </form>
        </div>
    </body>
</html>
