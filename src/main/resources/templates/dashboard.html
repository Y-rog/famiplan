<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Tableau de bord - FamiPlan')}"></head>
    <body class="bg-primary">
        <div class="mx-auto w-full max-w-2xl self-center flex flex-col gap-4 rounded-xl border border-white/30 bg-white/10 p-6 shadow-2xl backdrop-blur-sm">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold text-white">Mon tableau de bord</h1>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn-primary">Déconnexion</button>
                </form>
            </div>
            <form class="flex gap-2" method="post" th:action="@{/dashboard}" th:object="${task}">
                <input class="flex-1 rounded-xl border border-white/30 bg-white/20 px-4 py-2 text-white placeholder-white/60 outline-none"
                       placeholder="Nouvelle tâche..."
                       th:field="*{description}"
                       type="text"/>
                <button class="btn-primary" type="submit">Ajouter</button>
            </form>
            <ul class="flex flex-col gap-2">
                <li class="li-primary flex justify-between items-center text-white" th:each="task : ${tasks}">
                    <span class="flex-1" th:text="${task.description}">Tâche</span>
                    <a th:href="@{/dashboard/{id}/edit(id=${task.id})}" class="btn-primary">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
                        </svg>
                    </a>
                    <form th:action="@{/dashboard/{id}(id=${task.id})}" method="post" class="ml-2">
                        <input type="hidden" name="_method" value="delete"/>
                        <button type="submit" class="btn-primary">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </body>
</html>
