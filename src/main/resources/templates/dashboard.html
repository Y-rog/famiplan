<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Tableau de bord - FamiPlan</title>
    <!-- Lien vers le CSS compilé -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
    <body class="bg-primary flex-col">
        <div class="w-full max-w-2xl rounded-xl border border-white/30 bg-white/10 p-6 shadow-2xl backdrop-blur-sm">
            <form class="w-full pt-6" th:action="@{/dashboard}" th:object="${task}" method="post">
                <input type="text" th:field="*{description}" />
                <button type="submit">Ajouter</button>
            </form>
            <ul class="w-full pt-6">
                <li class="li-primary" th:each="task : ${tasks}" th:text="${task.description}"></li>
            </ul>
        </div>
    </body>
</html>
