<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Tableau de bord - FamiPlan</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="bg-primary">
<div class="mx-auto w-full max-w-2xl self-center flex flex-col gap-4 rounded-xl border border-white/30 bg-white/10 p-6 shadow-2xl backdrop-blur-sm">
    <h1 class="text-2xl font-bold text-white">Mon tableau de bord</h1>
    <form class="flex gap-2" th:action="@{/dashboard}" th:object="${task}" method="post">
        <input class="flex-1 rounded-xl border border-white/30 bg-white/20 px-4 py-2 text-white placeholder-white/60 outline-none" type="text" th:field="*{description}" placeholder="Nouvelle tâche..." />
        <button class="btn-primary" type="submit">Ajouter</button>
    </form>
    <ul class="flex flex-col gap-2">
        <li class="li-primary text-white" th:each="task : ${tasks}" th:text="${task.description}"></li>
    </ul>
</div>
</body>
</html>
